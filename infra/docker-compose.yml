
services:
  # -------------------------------------------------
  # Reverse proxy (NGINX)
  # -------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: medusa-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/ssl/certs:ro
    depends_on:
      - api
      - frontend

  # -------------------------------------------------
  # Frontend (Next.js)
  # -------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medusa-frontend
    environment:
      - NODE_ENV=production
    depends_on:
      - api

  # -------------------------------------------------
  # API (FastAPI)
  # -------------------------------------------------
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medusa-api
    environment:
      - POSTGRES_DSN=postgresql+asyncpg://medusa:medusa@postgres:5432/medusa
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
    depends_on:
      - postgres
      - redis

  # -------------------------------------------------
  # PostgreSQL
  # -------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: medusa-postgres
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: medusa
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------
  # Redis (cache + rate limit)
  # -------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: medusa-redis
    command: ["redis-server", "--requirepass", "medusa"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------
  # Monitoring stack
  # -------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.54
    container_name: medusa-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:10.4
    container_name: medusa-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    env_file:
      - .env.grafana

  loki:
    image: grafana/loki:2.9
    container_name: medusa-loki
    ports:
      - "3100:3100"

volumes:
  pg_data:
  redis_data:
